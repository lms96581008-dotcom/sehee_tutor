<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📚 Sehee Tutor Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F4F5F7;font-family:'Inter','Noto Sans KR',sans-serif;color:#1A202C;min-height:100vh;}
::placeholder{color:#C4CCDA;}
input,textarea,button,select{font-family:inherit;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#6366F1!important;box-shadow:0 0 0 3px rgba(99,102,241,.1)!important;}
button{cursor:pointer;transition:all .15s;}button:active{transform:scale(.97);}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}
a{color:#6366F1;}input[type=date]{color-scheme:light;}

/* HEADER */
.hdr{background:#fff;border-bottom:1.5px solid #EAECF0;padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;height:62px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.logo-title{font-size:18px;font-weight:800;color:#1A202C;letter-spacing:-.3px;}
.logo-sub{font-size:11px;color:#94A3B8;font-weight:500;}
.sp{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid;}
.sp.local{background:#F8FAFC;border-color:#E2E8F0;color:#64748B;}
.sp.saving{background:#FFFBEB;border-color:#FCD34D;color:#92400E;}
.sp.saved{background:#F0FDF4;border-color:#86EFAC;color:#166534;}
.sp.error{background:#FEF2F2;border-color:#FCA5A5;color:#991B1B;}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-ghost{background:#fff;border:1.5px solid #E2E8F0;border-radius:9px;padding:6px 13px;font-size:12px;color:#475569;font-weight:600;}
.btn-ghost:hover{background:#F8FAFC;}

/* TABS */
.tab-bar{background:#fff;border-bottom:1.5px solid #EAECF0;padding:0 24px;}
.tab-bar-in{max-width:1400px;margin:0 auto;display:flex;gap:4px;}
.tb{padding:13px 16px;font-size:13px;font-weight:600;color:#94A3B8;border:none;background:none;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;}
.tb.on{color:#6366F1;border-bottom-color:#6366F1;}
.tb:hover:not(.on){color:#475569;}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:22px 24px 60px;}

/* TODAY ALERT */
.ta{background:linear-gradient(135deg,#EEF2FF,#F5F3FF);border:1.5px solid #C7D2FE;border-radius:14px;padding:14px 18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start;}
.ta-t{font-size:13px;font-weight:700;color:#4338CA;margin-bottom:3px;}
.ta-b{font-size:12px;color:#4F46E5;line-height:1.7;}

/* STATS */
.sr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.sb2{background:#fff;border-radius:14px;padding:14px 18px;border:1px solid #F1F5F9;box-shadow:0 1px 4px rgba(0,0,0,.04);flex:1;min-width:100px;}
.sn{font-size:22px;font-weight:800;}.su{font-size:11px;color:#94A3B8;font-weight:600;margin-left:2px;}
.sl{font-size:10px;color:#94A3B8;margin-top:3px;font-weight:500;}

/* TOOLBAR */
.tlb{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.srch{position:relative;flex:1;max-width:260px;}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#94A3B8;pointer-events:none;}
.si2{width:100%;background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;padding:9px 12px 9px 32px;font-size:13px;color:#1A202C;}
.btn-add{background:#6366F1;border:none;border-radius:10px;padding:9px 18px;font-size:13px;color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(99,102,241,.25);}
.btn-add:hover{background:#5254D4;transform:translateY(-1px);}

/* POST-IT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:16px;}
.pcard{border-radius:12px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);position:relative;display:flex;flex-direction:column;gap:11px;transition:transform .2s,box-shadow .2s;}
.pcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.12);}
.pcard::after{content:'';position:absolute;bottom:0;right:0;width:20px;height:20px;background:linear-gradient(225deg,rgba(0,0,0,.09) 50%,transparent 50%);border-radius:0 0 12px 0;}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.cn{flex:1;min-width:0;}
.nkr{font-size:15px;font-weight:800;color:#1A202C;letter-spacing:-.2px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nen{font-size:12px;color:#64748B;font-weight:500;margin-top:1px;}
.nsub{font-size:10px;color:#94A3B8;margin-top:2px;}
.rbadge{font-size:11px;font-weight:700;color:#fff;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.rem-badge{font-size:10px;font-weight:700;background:rgba(99,102,241,.12);color:#4F46E5;border-radius:20px;padding:2px 7px;cursor:pointer;}
.notes-area{display:flex;flex-direction:column;gap:6px;min-height:32px;}
.ni{border-radius:8px;padding:8px 10px;position:relative;cursor:default;}
.ni:hover .nibtn{opacity:1!important;}
.ni-text{font-size:12px;color:#1A202C;font-weight:500;line-height:1.5;}
.ni-date{font-size:10px;font-weight:600;margin-top:3px;}
.nibtn{position:absolute;top:5px;right:6px;display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.nibtn button{border:none;border-radius:5px;padding:2px 6px;font-size:10px;}
.no-notes{font-size:11px;color:#94A3B8;text-align:center;padding:8px 0;}
.btn-an{width:100%;background:rgba(0,0,0,.04);border:1.5px dashed rgba(0,0,0,.12);border-radius:8px;padding:7px;font-size:11px;color:#64748B;font-weight:600;}
.btn-an:hover{background:rgba(0,0,0,.07);}
.cf{display:flex;justify-content:flex-end;}
.btn-dc{background:none;border:none;font-size:13px;color:#CBD5E1;padding:3px 6px;border-radius:5px;}
.btn-dc:hover{color:#F87171;}
.nform{background:rgba(255,255,255,.85);border:1.5px solid rgba(0,0,0,.1);border-radius:10px;padding:10px 11px;}
.cpills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.cpill{border-radius:20px;padding:3px 9px;font-size:10px;font-weight:600;border:1.5px solid;cursor:pointer;transition:all .15s;}
.nta{width:100%;background:#fff;border:1px solid #E2E8F0;border-radius:7px;padding:6px 9px;font-size:12px;resize:vertical;min-height:50px;color:#1A202C;line-height:1.5;}
.nfrow{display:flex;gap:6px;align-items:center;margin-top:6px;}
.ndi{flex:1;border:1px solid #E2E8F0;border-radius:7px;padding:5px 8px;font-size:11px;color:#64748B;background:#fff;}
.btn-ns{background:#6366F1;border:none;border-radius:7px;padding:6px 13px;font-size:11px;color:#fff;font-weight:700;}
.btn-nc{background:#F1F5F9;border:none;border-radius:7px;padding:6px 10px;font-size:11px;color:#64748B;font-weight:600;}

/* PAYMENT TAB */
.pay-hdr{background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:16px;border:1px solid #F1F5F9;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.pay-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.pay-month{font-size:20px;font-weight:800;color:#1A202C;flex:1;}
.pay-nbtn{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:6px 14px;font-size:15px;color:#475569;font-weight:700;}
.pay-stats{display:flex;gap:10px;flex-wrap:wrap;}
.ps{background:#F8FAFC;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:8px;border:1px solid #F1F5F9;}
.ps-led{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ps-t{font-size:12px;font-weight:600;color:#475569;}
.ps-n{font-size:16px;font-weight:800;margin-left:4px;}
.pay-list{display:flex;flex-direction:column;gap:8px;}
.prow{background:#fff;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;border:1px solid #F1F5F9;box-shadow:0 1px 3px rgba(0,0,0,.03);transition:all .15s;}
.prow:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);transform:translateY(-1px);}
.pr-num{font-size:12px;color:#CBD5E1;font-weight:700;width:22px;flex-shrink:0;text-align:center;}
.pr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pr-info{flex:1;min-width:0;}
.pr-kr{font-size:14px;font-weight:700;color:#1A202C;}
.pr-en{font-size:11px;color:#94A3B8;font-weight:500;}
.pr-meta{font-size:10px;color:#CBD5E1;margin-top:2px;}
.pr-rate{font-size:12px;font-weight:700;color:#fff;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.led-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 12px;border-radius:10px;border:1.5px solid;transition:all .18s;flex-shrink:0;}
.led-wrap:hover{filter:brightness(.96);}
.led{width:12px;height:12px;border-radius:50%;flex-shrink:0;transition:all .2s;}
.led-on-blue{background:#3B82F6;box-shadow:0 0 8px rgba(59,130,246,.7);}
.led-on-green{background:#10B981;box-shadow:0 0 8px rgba(16,185,129,.7);}
.led-off{background:#E2E8F0;box-shadow:none;}
.led-txt{font-size:11px;font-weight:700;}

/* CALENDAR TAB */
.cal-layout{display:grid;grid-template-columns:1fr 310px;gap:18px;}
.cal-box{background:#fff;border-radius:16px;padding:24px;border:1px solid #F1F5F9;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.cal-nav2{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.cal-title2{font-size:18px;font-weight:800;color:#1A202C;flex:1;}
.cal-nbtn2{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:6px 13px;font-size:14px;color:#475569;font-weight:700;}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.cal-hd{text-align:center;font-size:11px;font-weight:700;color:#94A3B8;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cday{min-height:76px;background:#FAFAFA;border-radius:10px;padding:7px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.cday:hover{background:#F1F5F9;border-color:#E2E8F0;}
.cday.today{background:#EEF2FF;border-color:#A5B4FC;}
.cday.other{opacity:.32;}.cday.hase{border-color:#C7D2FE;}
.cdnum{font-size:12px;font-weight:600;color:#475569;margin-bottom:3px;}
.cday.today .cdnum{background:#6366F1;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
.cevents{display:flex;flex-direction:column;gap:2px;}
.cetag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
.cmore{font-size:9px;color:#94A3B8;font-weight:600;}
.csb{background:#fff;border-radius:16px;padding:18px;border:1px solid #F1F5F9;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow-y:auto;max-height:620px;}
.csb-t{font-size:13px;font-weight:700;color:#1A202C;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.ritem{background:#F8FAFC;border-radius:9px;padding:9px 11px;margin-bottom:7px;display:flex;gap:8px;align-items:flex-start;border:1px solid #F1F5F9;border-left:3px solid;}
.ri-text{font-size:12px;color:#334155;font-weight:500;line-height:1.4;}
.ri-stu{font-size:10px;color:#6366F1;font-weight:600;margin-top:2px;}
.ri-date{font-size:10px;color:#94A3B8;font-weight:600;margin-top:1px;}
.csb-empty{font-size:12px;color:#94A3B8;text-align:center;padding:24px 0;line-height:1.8;}

/* REMINDERS */
.rtab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.rmc{background:#fff;border-radius:14px;padding:18px;border:1px solid #F1F5F9;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.rmc-hdr{font-size:13px;font-weight:800;color:#1A202C;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.rmc-now{background:#EEF2FF;color:#6366F1;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.rmc-past{font-size:10px;color:#94A3B8;}

/* MODALS */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;backdrop-filter:blur(3px);}
.mbox{background:#fff;border-radius:20px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:100%;}
.mt{font-size:16px;font-weight:800;color:#1A202C;margin-bottom:3px;}
.ms{font-size:12px;color:#94A3B8;margin-bottom:20px;}
.fg{margin-bottom:13px;}
.fl{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.fi{width:100%;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px 13px;font-size:13px;color:#1A202C;}
.fi:focus{background:#fff;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ma{display:flex;gap:8px;margin-top:6px;}
.btn-mp{flex:1;background:#6366F1;border:none;border-radius:11px;padding:11px 0;color:#fff;font-weight:700;font-size:13px;box-shadow:0 4px 12px rgba(99,102,241,.25);}
.btn-mp:hover{background:#5254D4;}
.btn-ms2{background:#F1F5F9;border:none;border-radius:11px;padding:11px 18px;color:#64748B;font-weight:600;font-size:13px;}
code{background:#F1F5F9;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px;}
</style>
</head>
<body>

<div class="hdr"><div class="hdr-in">
  <div class="logo-icon">📚</div>
  <div><div class="logo-title">Sehee Tutor</div><div class="logo-sub">Student Dashboard</div></div>
  <span id="sync-pill" class="sp local">💾 로컬 저장</span>
  <div class="hdr-r"><button class="btn-ghost" onclick="openM('mfb')">☁️ Firebase</button></div>
</div></div>

<div class="tab-bar"><div class="tab-bar-in">
  <button class="tb on"  onclick="tab('notes',this)">📋 학생 노트</button>
  <button class="tb"     onclick="tab('pay',this)">💰 정산 내역</button>
  <button class="tb"     onclick="tab('cal',this)">📅 캘린더</button>
  <button class="tb"     onclick="tab('rem',this)">📌 리마인더</button>
</div></div>

<div class="main">
  <div id="today-alert" style="display:none"></div>

  <!-- TAB: NOTES -->
  <div id="t-notes">
    <div class="sr" id="stats-row"></div>
    <div class="tlb">
      <div class="srch"><span class="si">🔍</span><input class="si2" id="srch" placeholder="학생 검색…" oninput="onSearch(this.value)"></div>
      <button class="btn-add" onclick="openM('mstu')">+ 학생 추가</button>
    </div>
    <div id="pgrid" class="pgrid"></div>
  </div>

  <!-- TAB: PAYMENT -->
  <div id="t-pay" style="display:none">
    <div class="pay-hdr">
      <div class="pay-nav">
        <button class="pay-nbtn" onclick="payGo(-1)">‹</button>
        <div class="pay-month" id="pay-month-title"></div>
        <button class="pay-nbtn" onclick="payGo(1)">›</button>
        <button class="pay-nbtn" style="font-size:11px" onclick="payGoNow()">이번 달</button>
      </div>
      <div class="pay-stats" id="pay-stats"></div>
    </div>
    <div id="pay-list" class="pay-list"></div>
  </div>

  <!-- TAB: CALENDAR -->
  <div id="t-cal" style="display:none">
    <div class="cal-layout">
      <div class="cal-box">
        <div class="cal-nav2">
          <button class="cal-nbtn2" onclick="calGo(-1)">‹</button>
          <div class="cal-title2" id="cal-title"></div>
          <button class="cal-nbtn2" onclick="calGo(1)">›</button>
          <button class="cal-nbtn2" style="font-size:11px" onclick="calNow()">오늘</button>
        </div>
        <div class="cal-hdr">
          <div class="cal-hd" style="color:#EF4444">일</div>
          <div class="cal-hd">월</div><div class="cal-hd">화</div><div class="cal-hd">수</div>
          <div class="cal-hd">목</div><div class="cal-hd">금</div>
          <div class="cal-hd" style="color:#3B82F6">토</div>
        </div>
        <div id="cal-grid" class="cal-grid"></div>
      </div>
      <div class="csb">
        <div class="csb-t">📌 <span id="sb-month"></span> 일정</div>
        <div id="sb-events"></div>
      </div>
    </div>
  </div>

  <!-- TAB: REMINDERS -->
  <div id="t-rem" style="display:none"><div id="rtab"></div></div>
</div>

<!-- MODAL: ADD/EDIT STUDENT -->
<div id="mstu" class="mbg" style="display:none" onclick="if(event.target===this)closeM('mstu')">
  <div class="mbox" style="max-width:420px" onclick="event.stopPropagation()">
    <div class="mt" id="mstu-title">+ 새 학생 추가</div><div class="ms">학생 정보를 입력해 주세요</div>
    <div class="fg-row">
      <div class="fg"><div class="fl">한국 이름</div><input class="fi" id="skr" placeholder="예: 홍길동"></div>
      <div class="fg"><div class="fl">영어 이름</div><input class="fi" id="sen" placeholder="예: Gildong"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><div class="fl">학교</div><input class="fi" id="sschool" placeholder="예: KIS, SIS, BFS…"></div>
      <div class="fg"><div class="fl">학년</div><input class="fi" id="sgrade" placeholder="예: G6, G7…"></div>
    </div>
    <div class="fg"><div class="fl">시급 (만원)</div><input class="fi" id="srate" type="number" min="1" placeholder="예: 9"></div>
    <div class="ma">
      <button class="btn-mp" id="mstu-btn" onclick="doAddStu()">추가</button>
      <button class="btn-ms2" onclick="closeM('mstu')">취소</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD EVENT -->
<div id="mev" class="mbg" style="display:none" onclick="if(event.target===this)closeM('mev')">
  <div class="mbox" style="max-width:380px" onclick="event.stopPropagation()">
    <div class="mt">📅 일정 추가</div><div class="ms" id="ev-sub"></div>
    <div class="fg"><div class="fl">날짜</div><input class="fi" id="ev-date" type="date"></div>
    <div class="fg"><div class="fl">내용</div><input class="fi" id="ev-text" placeholder="예: KIS 판교 입학 면접" onkeydown="if(event.key==='Enter')doAddEvent()"></div>
    <div class="fg"><div class="fl">학생 (선택)</div><select class="fi" id="ev-stu"></select></div>
    <div class="fg"><div class="fl">카테고리</div><div id="ev-cats" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px"></div></div>
    <div class="ma"><button class="btn-mp" onclick="doAddEvent()">저장</button><button class="btn-ms2" onclick="closeM('mev')">취소</button></div>
  </div>
</div>

<!-- MODAL: FIREBASE -->
<div id="mfb" class="mbg" style="display:none" onclick="if(event.target===this)closeM('mfb')">
  <div class="mbox" style="max-width:460px" onclick="event.stopPropagation()">
    <div class="mt">☁️ Firebase 상태</div>
    <div class="ms">Firebase가 자동 연결되어 있어요. 데이터가 클라우드에 실시간 저장됩니다.</div>
    <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:12px 14px;font-size:12px;color:#166534;line-height:1.7;margin-bottom:16px">
      ✅ Project: student-management-abe1e<br>
      ✅ 모든 기기에서 자동 동기화<br>
      ✅ 월별 정산 내역 영구 보존
    </div>

/* ═══ BUILDERS ═══ */
function buildCR(sid,sel){
  const s=sel||'general';
  return `<div class="cpills" id="cr-${sid}" data-sel="${s}">
    ${Object.entries(CATS).map(([k,v])=>`
      <button class="cpill" data-cat="${k}" onclick="setCat('${sid}','${k}')"
        style="background:${k===s?v.bg:'white'};border-color:${k===s?v.bd:'#E2E8F0'};color:${k===s?v.c:'#94A3B8'}">
        ${v.i} ${v.l}</button>`).join('')}
  </div>`;
}
function buildNF(sid,init){
  const act=init?`doUN('${sid}','${init.id}')`:`doAN('${sid}')`;
  return `<div class="nform">${buildCR(sid,init?.category)}
    <textarea class="nta" id="nt-${sid}" placeholder="메모 내용 입력…">${esc(init?.text||'')}</textarea>
    <div class="nfrow">
      <input type="date" class="ndi" id="nd-${sid}" value="${init?.date||''}">
      <button class="btn-ns" onclick="${act}">저장</button>
      <button class="btn-nc" onclick="cancelNF()">✕</button>
    </div></div>`;
}
function buildNC(sid,n){
  const isE=editNR?.sid===sid&&editNR?.nid===n.id;
  if(isE) return buildNF(sid,n);
  const c=CATS[n.category]||CATS.general;
  return `<div class="ni" style="background:${c.bg};border:1px solid ${c.bd}">
    <div class="ni-text">${c.i} ${esc(n.text)}</div>
    ${n.date?`<div class="ni-date" style="color:${c.c}">📅 ${n.date}</div>`:''}
    <div class="nibtn">
      <button onclick="openEN('${sid}','${n.id}')" style="background:rgba(0,0,0,.06);color:#475569">✏️</button>
      <button onclick="delN('${sid}','${n.id}')" style="background:rgba(220,38,38,.08);color:#DC2626">✕</button>
    </div></div>`;
}
function buildCard(s,idx){
  const c=PC[s.ci!==undefined?s.ci:idx%PC.length];
  const sN=N[s.id]||[];
  const isA=addNF===s.id;
  const remCnt=[...sN.filter(n=>n.date&&n.date>=todayStr),...Object.entries(CAL).flatMap(([d,ev])=>ev.filter(e=>e.studentId===s.id&&d>=todayStr))].length;
  const curMK=mkOf(new Date(nd.getFullYear(),nd.getMonth(),1));
  const ps=getPS(curMK,s.id);
  const paidDot=ps.paid?'background:#10B981;box-shadow:0 0 6px rgba(16,185,129,.6)':'background:#E2E8F0';
  const msgDot=ps.msgSent?'background:#3B82F6;box-shadow:0 0 6px rgba(59,130,246,.6)':'background:#E2E8F0';

  return `<div class="pcard" style="background:${c.bg};border:1.5px solid ${c.bd}">
    <div class="ch">
      <div class="cn">
        <div class="nkr">${esc(s.kr)}</div>
        <div class="nen">${esc(s.en)}</div>
        <div class="nsub">${s.grade?esc(s.grade):''}${s.grade&&s.school?' · ':''}${s.school?esc(s.school):''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <span class="rbadge" style="background:${rc(s.rate)}">${s.rate}만원</span>
        <div style="display:flex;gap:5px;align-items:center">
          <span style="font-size:9px;color:#94A3B8">문자</span><div style="width:8px;height:8px;border-radius:50%;${msgDot}"></div>
          <span style="font-size:9px;color:#94A3B8">입금</span><div style="width:8px;height:8px;border-radius:50%;${paidDot}"></div>
        </div>
        ${remCnt>0?`<span class="rem-badge" onclick="tab('rem',document.querySelectorAll('.tb')[3])">📅 ${remCnt}</span>`:''}
      </div>
    </div>
    <div class="notes-area">
      ${isA?buildNF(s.id,null):''}
      ${sN.length===0&&!isA?'<div class="no-notes">메모 없음</div>':''}
      ${sN.map(n=>buildNC(s.id,n)).join('')}
    </div>
    ${!isA?`<button class="btn-an" onclick="openNF('${s.id}')">+ 메모 추가</button>`:''}
    <div class="cf" style="gap:6px">
      <button onclick="openEditStu('${s.id}')" style="background:none;border:none;font-size:13px;color:#CBD5E1;padding:3px 6px;border-radius:5px;" onmouseover="this.style.color='#6366F1'" onmouseout="this.style.color='#CBD5E1'">✏️</button>
      <button class="btn-dc" onclick="delStu('${s.id}')">🗑</button>
    </div>
  </div>`;
}

/* ═══ RENDER NOTES ═══ */
function updateStats(){
  const tot=S.length;
  const avg=tot?(S.reduce((a,s)=>a+s.rate,0)/tot).toFixed(1):0;
  const maxR=tot?Math.max(...S.map(s=>s.rate)):0;
  const curMK=mkOf(new Date(nd.getFullYear(),nd.getMonth(),1));
  const paidN=S.filter(s=>(PAY[curMK]||{})[s.id]?.paid).length;
  const msgN=S.filter(s=>(PAY[curMK]||{})[s.id]?.msgSent).length;
  document.getElementById('stats-row').innerHTML=[
    {v:tot,u:'명',l:'총 학생',col:'#6366F1'},
    {v:avg,u:'만원',l:'평균 시급',col:'#059669'},
    {v:maxR,u:'만원',l:'최고 시급',col:'#7C3AED'},
    {v:paidN+'/'+tot,u:'',l:'💰 이번 달 입금',col:paidN===tot&&tot>0?'#059669':'#D97706'},
    {v:msgN+'/'+tot,u:'',l:'✉️ 이번 달 문자',col:msgN===tot&&tot>0?'#0891B2':'#94A3B8'},
  ].map(x=>`<div class="sb2"><div><span class="sn" style="color:${x.col}">${x.v}</span><span class="su">${x.u}</span></div><div class="sl">${x.l}</div></div>`).join('');
}
function renderAlert(){
  const ev=CAL[todayStr]||[];
  const el=document.getElementById('today-alert');
  if(!ev.length){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=`<div style="font-size:20px">🔔</div><div><div class="ta-t">오늘의 일정 (${ev.length}개)</div><div class="ta-b">${ev.map(e=>{const st=e.studentId?S.find(s=>s.id===e.studentId):null;return(st?`[${esc(st.en)}] `:'')+esc(e.text);}).join('<br>')}</div></div>`;
}
function render(){
  const q=srch.toLowerCase();
  const f=S.filter(s=>!q||s.kr.includes(q)||s.en.toLowerCase().includes(q)).sort((a,b)=>b.rate-a.rate);
  document.getElementById('pgrid').innerHTML=f.length
    ?f.map((s,i)=>buildCard(s,i)).join('')
    :`<div style="grid-column:1/-1;text-align:center;padding:48px;background:#fff;border-radius:16px;color:#94A3B8;font-size:13px">검색 결과가 없습니다</div>`;
  updateStats(); renderAlert();
}

function renderPay(){
  const mk=mkOf(payM);
  const isNow=mk===mkOf(new Date(nd.getFullYear(),nd.getMonth(),1));
  document.getElementById('pay-month-title').textContent=`${payM.getFullYear()}년 ${MO[payM.getMonth()]}${isNow?' ★':''}`;
  const sorted=[...S].sort((a,b)=>b.rate-a.rate);
  const paidN=sorted.filter(s=>(PAY[mk]||{})[s.id]?.paid).length;
  const msgN=sorted.filter(s=>(PAY[mk]||{})[s.id]?.msgSent).length;
  const tot=sorted.length;

  document.getElementById('pay-stats').innerHTML=`
    <div class="ps"><div class="ps-led" style="background:#3B82F6;box-shadow:0 0 8px rgba(59,130,246,.6)"></div><span class="ps-t">정산문자 전송</span><span class="ps-n" style="color:#3B82F6">${msgN}/${tot}</span></div>
    <div class="ps"><div class="ps-led" style="background:#10B981;box-shadow:0 0 8px rgba(16,185,129,.6)"></div><span class="ps-t">입금 완료</span><span class="ps-n" style="color:#10B981">${paidN}/${tot}</span></div>
    <div class="ps"><div class="ps-led" style="background:#F59E0B;box-shadow:0 0 8px rgba(245,158,11,.5)"></div><span class="ps-t">미입금</span><span class="ps-n" style="color:#F59E0B">${tot-paidN}</span></div>`;

  document.getElementById('pay-list').innerHTML=sorted.map((s,i)=>{
    const ps=getPS(mk,s.id);
    const msgOn=ps.msgSent, paidOn=ps.paid;
    const c=PC[s.ci!==undefined?s.ci:i%PC.length];
    return `<div class="prow">
      <div class="pr-num">${i+1}</div>
      <div class="pr-dot" style="background:${rc(s.rate)};box-shadow:0 0 6px ${rc(s.rate)}80"></div>
      <div class="pr-info">
        <div class="pr-kr">${esc(s.kr)}</div>
        <div class="pr-en">${esc(s.en)}${s.grade||s.school?' · '+[s.grade,s.school].filter(Boolean).join(' '):''}</div>
      </div>
      <span class="pr-rate" style="background:${rc(s.rate)}">${s.rate}만원</span>
      <div class="led-wrap" onclick="togP('${s.id}','msgSent')"
        style="background:${msgOn?'#EFF6FF':'#F8FAFC'};border-color:${msgOn?'#93C5FD':'#E2E8F0'}">
        <div class="led ${msgOn?'led-on-blue':'led-off'}"></div>
        <span class="led-txt" style="color:${msgOn?'#1D4ED8':'#94A3B8'}">${msgOn?'✉️ 전송':'미전송'}</span>
      </div>
      <div class="led-wrap" onclick="togP('${s.id}','paid')"
        style="background:${paidOn?'#F0FDF4':'#F8FAFC'};border-color:${paidOn?'#6EE7B7':'#E2E8F0'}">
        <div class="led ${paidOn?'led-on-green':'led-off'}"></div>
        <span class="led-txt" style="color:${paidOn?'#065F46':'#94A3B8'}">${paidOn?'✓ 입금':'미입금'}</span>
      </div>
    </div>`;
  }).join('');
}

/* ═══ RENDER CALENDAR ═══ */
function renderCal(){
  const y=calM.getFullYear(),m=calM.getMonth();
  document.getElementById('cal-title').textContent=`${y}년 ${MO[m]}`;
  document.getElementById('sb-month').textContent=MO[m];
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const total=Math.ceil((first+dim)/7)*7;
  let html='';
  for(let i=0;i<total;i++){
    let dn,ds,om=false;const col=i%7;
    if(i<first){dn=new Date(y,m,0).getDate()-first+i+1;const pm=m===0?12:m,py=m===0?y-1:y;ds=`${py}-${String(pm).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;om=true;}
    else if(i<first+dim){dn=i-first+1;ds=`${y}-${String(m+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;}
    else{dn=i-first-dim+1;const nm=m===11?1:m+2,ny=m===11?y+1:y;ds=`${ny}-${String(nm).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;om=true;}
    const isT=!om&&ds===todayStr;
    const cev=CAL[ds]||[];
    const nev=S.flatMap(s=>(N[s.id]||[]).filter(n=>n.date===ds).map(n=>({...n,fromNote:true})));
    const allEv=[...cev,...nev];const hasE=allEv.length>0;
    html+=`<div class="cday${isT?' today':''}${om?' other':''}${hasE?' hase':''}" onclick="openEv('${ds}')">
      <div class="cdnum" style="${!isT&&col===0?'color:#EF4444':!isT&&col===6?'color:#3B82F6':''}">${dn}</div>
      <div class="cevents">
        ${allEv.slice(0,2).map(e=>{const c=CATS[e.category]||CATS.general;return`<div class="cetag" style="background:${c.bg};color:${c.c};border:1px solid ${c.bd}">${c.i} ${esc((e.text||'').slice(0,9))}${(e.text||'').length>9?'…':''}</div>`;}).join('')}
        ${allEv.length>2?`<div class="cmore">+${allEv.length-2}개</div>`:''}
      </div></div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  renderSB();
}
function renderSB(){
  const y=calM.getFullYear(),m=calM.getMonth();
  const evs=[];
  for(const [ds,arr] of Object.entries(CAL)){const d=new Date(ds+'T00:00:00');if(d.getFullYear()===y&&d.getMonth()===m)arr.forEach(e=>evs.push({...e,date:ds,d}));}
  S.forEach(s=>(N[s.id]||[]).forEach(n=>{if(n.date){const d=new Date(n.date+'T00:00:00');if(d.getFullYear()===y&&d.getMonth()===m)evs.push({...n,studentId:s.id,date:n.date,d,fromNote:true});}}));
  evs.sort((a,b)=>a.d-b.d);
  if(!evs.length){document.getElementById('sb-events').innerHTML=`<div class="csb-empty">이 달에 일정이 없습니다<br><small>날짜를 클릭하면 추가할 수 있어요</small></div>`;return;}
  document.getElementById('sb-events').innerHTML=evs.map(e=>{
    const c=CATS[e.category]||CATS.general;const st=e.studentId?S.find(s=>s.id===e.studentId):null;
    return`<div class="ritem" style="border-left-color:${c.c}">
      <span style="font-size:14px;flex-shrink:0">${c.i}</span>
      <div style="flex:1;min-width:0"><div class="ri-text">${esc(e.text)}</div>${st?`<div class="ri-stu">${esc(st.kr)} · ${esc(st.en)}</div>`:''}<div class="ri-date">📅 ${e.date}</div></div>
      ${!e.fromNote?`<button onclick="delEv('${e.date}','${e.id}')" style="background:none;border:none;color:#CBD5E1;cursor:pointer;font-size:13px;flex-shrink:0">✕</button>`:''}
    </div>`;
  }).join('');
}

/* ═══ RENDER REMINDERS ═══ */
function renderRTab(){
  const tm=nd.getMonth()+1,ty=nd.getFullYear();
  const map={};
  for(const [ds,arr] of Object.entries(CAL)){const d=new Date(ds+'T00:00:00');const k=`${d.getFullYear()}_${d.getMonth()+1}`;if(!map[k])map[k]={y:d.getFullYear(),m:d.getMonth()+1,items:[]};arr.forEach(e=>map[k].items.push({...e,date:ds,d}));}
  S.forEach(s=>(N[s.id]||[]).forEach(n=>{if(n.date){const d=new Date(n.date+'T00:00:00');const k=`${d.getFullYear()}_${d.getMonth()+1}`;if(!map[k])map[k]={y:d.getFullYear(),m:d.getMonth()+1,items:[]};map[k].items.push({...n,studentId:s.id,date:n.date,d,fromNote:true});}}));
  const keys=Object.keys(map).sort();
  if(!keys.length){document.getElementById('rtab').innerHTML='<div style="text-align:center;padding:60px;color:#94A3B8;font-size:13px">📅 아직 일정이 없습니다<br><small style="display:block;margin-top:6px;font-size:11px">캘린더나 학생 메모에 날짜를 입력해 보세요!</small></div>';return;}
  document.getElementById('rtab').innerHTML=`<div class="rtab-grid">${keys.map(k=>{
    const g=map[k];const isNow=g.y===ty&&g.m===tm;const isPast=new Date(g.y,g.m-1)<new Date(ty,tm-1);
    g.items.sort((a,b)=>a.d-b.d);
    return`<div class="rmc" style="${isNow?'border:2px solid #A5B4FC':''}${isPast?'opacity:.55':''}">
      <div class="rmc-hdr">${g.y}년 ${MO[g.m-1]} ${isNow?'<span class="rmc-now">이번 달 ★</span>':''} ${isPast?'<span class="rmc-past">(지난 달)</span>':''}</div>
      ${g.items.map(e=>{const c=CATS[e.category]||CATS.general;const st=e.studentId?S.find(s=>s.id===e.studentId):null;
        return`<div class="ritem" style="border-left-color:${c.c}"><span style="font-size:13px;flex-shrink:0">${c.i}</span>
          <div style="flex:1;min-width:0"><div class="ri-text">${esc(e.text)}</div>${st?`<div class="ri-stu">${esc(st.kr)} · ${esc(st.en)}</div>`:''}<div class="ri-date">📅 ${e.date}</div></div>
          ${!e.fromNote?`<button onclick="delEv('${e.date}','${e.id}')" style="background:none;border:none;color:#CBD5E1;cursor:pointer;font-size:13px;flex-shrink:0">✕</button>`:''}
        </div>`;}).join('')}
    </div>`;
  }).join('')}</div>`;
}
